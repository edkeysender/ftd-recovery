# If a per-MAC armed config exists, source it (it has timeout=0 and auto-boots).
# Otherwise fall through to a short local-boot fallback.
configfile ${prefix}/grub.cfg-${net_default_mac}

set timeout=3
set default=0
menuentry "Boot from local disk" { exit }
menuentry "Manual: open full Clonezilla menu" {
    configfile (tftp)/debian-installer/amd64/grub/grub-menu.cfg
}
