interface=__INTERFACE__
bind-interfaces
port=0
dhcp-range=__SUBNET_BASE__,proxy
dhcp-leasefile=/run/dnsmasq-clonezilla.leases

# MAC filtering: allow list managed by clonezilla-server mac-allow/mac-deny
dhcp-hostsfile=/etc/clonezilla-server/dhcp-hosts.conf

# Allowed MACs get Clonezilla PXE boot
pxe-service=tag:allowed,x86PC,"Clonezilla",pxelinux
pxe-service=tag:allowed,x86-64_EFI,"Clonezilla",ipxe
pxe-service=tag:allowed,BC_EFI,"Clonezilla",ipxe

# Non-allowed MACs boot from local disk immediately
pxe-service=tag:!allowed,x86PC,"Boot local",0
pxe-service=tag:!allowed,x86-64_EFI,"Boot local",0
pxe-service=tag:!allowed,BC_EFI,"Boot local",0

pxe-prompt="PXE", 0
enable-tftp
tftp-root=/srv/tftp
log-dhcp
log-queries
log-facility=/var/log/dnsmasq-pxe.log
